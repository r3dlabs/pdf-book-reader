<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOLIO — Book Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── THEMES ── */
[data-theme="dark"] {
  --bg: #0a0a0a;
  --surface: #161616;
  --surface2: #1e1e1e;
  --surface3: #252525;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --text2: #888;
  --muted: #444;
  --accent: #e8ff00;
  --accent2: #ff3c3c;
  --shadow: rgba(0,0,0,0.75);
  --shadow2: rgba(0,0,0,0.4);
  --spine: rgba(0,0,0,0.6);
  --page-shadow: 0 0 60px rgba(0,0,0,0.8);
  --highlight: rgba(232,255,0,0.1);
  --float-bg: rgba(18,18,18,0.92);
}

[data-theme="light"] {
  --bg: #d6d0c8;
  --surface: rgba(250,248,245,0.96);
  --surface2: #f0ede8;
  --surface3: #e4e0da;
  --border: #ccc8c0;
  --text: #1a1a1a;
  --text2: #666;
  --muted: #aaa;
  --accent: #b8860b;
  --accent2: #cc2222;
  --shadow: rgba(0,0,0,0.25);
  --shadow2: rgba(0,0,0,0.12);
  --spine: rgba(0,0,0,0.15);
  --page-shadow: 0 0 40px rgba(0,0,0,0.3);
  --highlight: rgba(184,134,11,0.12);
  --float-bg: rgba(250,248,245,0.94);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  transition: background 0.35s;
}

/* Subtle grain overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.032'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9000;
}

/* ══════════════════════════════════════
   BOOK STAGE — full viewport
══════════════════════════════════════ */
#stage {
  position: fixed; inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  transition: background 0.35s;
}

/* Drop zone */
#drop-zone {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; cursor: pointer;
  z-index: 10;
  transition: background 0.2s;
}
#drop-zone.drag-over { background: var(--highlight); }
#drop-zone.hidden { display: none; }

.dz-icon { font-size: 4rem; opacity: 0.18; }
.dz-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: 0.12em;
  opacity: 0.3;
}
.dz-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text2);
  opacity: 0.6;
}
.dz-btn {
  margin-top: 8px;
  background: var(--accent);
  color: #000;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 13px 32px;
  border: none; border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.dz-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 10px 32px var(--shadow2); }

/* ── BOOK WRAPPER ── */
#book-wrap {
  display: none;
  position: relative;
  /* sized by JS to fill viewport exactly */
}
#book-wrap.active { display: flex; align-items: stretch; }

/* Pages */
.page-side {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #fff;
  transition: background 0.3s;
}

/* Spine */
#spine {
  width: 0;
  position: relative;
  flex-shrink: 0;
  background: transparent;
  z-index: 5;
}
#spine::before {
  content: '';
  position: absolute;
  top: 0; left: -8px;
  width: 16px; height: 100%;
  background: linear-gradient(to right,
    rgba(0,0,0,0.22) 0%,
    var(--spine) 40%,
    var(--spine) 60%,
    rgba(0,0,0,0.22) 100%
  );
  pointer-events: none;
}

/* Canvas inside page */
.page-canvas {
  display: block;
  width: 100%; height: 100%;
  object-fit: contain;
}

/* Page number */
.pg-num {
  position: absolute;
  bottom: 10px;
  left: 0; right: 0;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  pointer-events: none;
  z-index: 3;
  transition: color 0.2s;
}
.pg-num.hit { color: var(--accent); }

/* ── FLIP GHOST ── */
#flip-ghost {
  position: fixed;
  top: 0; height: 100vh;
  pointer-events: none;
  z-index: 100;
  perspective: 2400px;
  display: none;
}
#flip-ghost.active { display: block; }
#flip-page {
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transform-origin: left center;
  will-change: transform;
  overflow: hidden;
  backface-visibility: hidden;
}
#flip-page canvas {
  width: 100%; height: 100%;
  display: block;
  object-fit: fill;
}

/* ══════════════════════════════════════
   FLOATING NAV BUTTONS
══════════════════════════════════════ */
.float-nav {
  position: fixed;
  bottom: 28px;
  z-index: 500;
  display: none;
  gap: 8px;
}
.float-nav.active { display: flex; }
.float-nav.left-side  { left: 28px; }
.float-nav.right-side { right: 28px; }

.fnav-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--float-bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: all 0.15s;
  box-shadow: 0 4px 20px var(--shadow2);
}
.fnav-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }
.fnav-btn:disabled { opacity: 0.25; pointer-events: none; }

/* Progress strip */
#progress-bar-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: transparent;
  z-index: 500;
  display: none;
  cursor: pointer;
}
#progress-bar-wrap.active { display: block; }
#progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
  pointer-events: none;
}
#progress-bar-wrap:hover { height: 6px; }

/* Page counter chip */
#page-chip {
  position: fixed;
  bottom: 38px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--float-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text2);
  letter-spacing: 0.08em;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: none;
  z-index: 500;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 4px 16px var(--shadow2);
  white-space: nowrap;
}
#page-chip.active { display: block; }
#page-chip:hover { border-color: var(--accent); color: var(--accent); }
#page-chip input {
  background: none; border: none; outline: none;
  font: inherit; color: inherit; width: 30px;
  text-align: center; cursor: pointer;
}
#page-chip input:focus { color: var(--accent); }

/* ══════════════════════════════════════
   FLOATING MENU (burger)
══════════════════════════════════════ */
#menu-root {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 800;
}

#menu-trigger {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--float-bg);
  border: 1px solid var(--border);
  color: var(--text);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 4px 24px var(--shadow2);
  transition: all 0.2s;
  flex-direction: column;
  gap: 4px;
  padding: 13px 12px;
}

#menu-trigger:hover { border-color: var(--accent); }
#menu-trigger.open { background: var(--accent); border-color: var(--accent); }

.burger-bar {
  display: block;
  width: 18px; height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all 0.25s;
  transform-origin: center;
}
#menu-trigger.open .burger-bar { background: #000; }
#menu-trigger.open .burger-bar:nth-child(1) { transform: translateY(6px) rotate(45deg); }
#menu-trigger.open .burger-bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
#menu-trigger.open .burger-bar:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

/* Menu panel */
#menu-panel {
  position: absolute;
  top: 54px; right: 0;
  width: 240px;
  background: var(--float-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 16px 48px var(--shadow);
  overflow: hidden;
  transform-origin: top right;
  transform: scale(0.85);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.18s;
}
#menu-panel.open {
  transform: scale(1);
  opacity: 1;
  pointer-events: all;
}

.menu-section {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.menu-section:last-child { border-bottom: none; }

.menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  font-size: 0.82rem;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.menu-item:hover { background: var(--highlight); color: var(--accent); }
.menu-item.active-item { color: var(--accent); }

.menu-icon {
  width: 20px;
  text-align: center;
  font-size: 1rem;
  flex-shrink: 0;
  opacity: 0.7;
}

.menu-label { flex: 1; }
.menu-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  background: var(--surface3);
  border-radius: 10px;
  padding: 2px 7px;
  color: var(--text2);
}
.menu-badge.on { background: var(--accent); color: #000; }

/* Search panel inside menu */
#search-panel {
  display: none;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
#search-panel.open { display: block; }

.search-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.search-row input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  padding: 8px 12px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
}
.search-row input:focus { border-color: var(--accent); }
.search-row input::placeholder { color: var(--muted); }
.search-go {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 4px;
  padding: 8px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  cursor: pointer;
  white-space: nowrap;
}
.search-go:hover { background: #fff; }

#search-results-menu {
  max-height: 200px;
  overflow-y: auto;
  margin-top: 8px;
}
#search-results-menu::-webkit-scrollbar { width: 3px; }
#search-results-menu::-webkit-scrollbar-thumb { background: var(--border); }

.sr-item {
  padding: 8px 4px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.1s;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--highlight); }
.sr-page { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 2px; }
.sr-text { font-size: 0.72rem; color: var(--text2); line-height: 1.4; }
.sr-text mark { background: var(--accent); color: #000; border-radius: 2px; padding: 0 2px; }
.sr-empty { padding: 14px 4px; text-align: center; font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); }

/* ══════════════════════════════════════
   TOC PANEL — floating overlay
══════════════════════════════════════ */
#toc-panel {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 300px;
  background: var(--float-bg);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 700;
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 8px 0 40px var(--shadow);
}
#toc-panel.open { transform: translateX(0); }

#toc-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.toc-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.08em;
}
.toc-close {
  width: 28px; height: 28px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.7rem;
  color: var(--text2);
  transition: all 0.15s;
}
.toc-close:hover { border-color: var(--accent2); color: var(--accent2); }

#toc-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0 20px;
}
#toc-list::-webkit-scrollbar { width: 3px; }
#toc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.toc-item {
  display: flex;
  align-items: baseline;
  gap: 0;
  padding: 8px 20px;
  font-size: 0.8rem;
  color: var(--text2);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s;
  line-height: 1.4;
}
.toc-item:hover { background: var(--highlight); color: var(--text); border-left-color: var(--accent); }
.toc-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--highlight); }
.toc-item[data-level="2"] { padding-left: 32px; font-size: 0.75rem; }
.toc-item[data-level="3"] { padding-left: 44px; font-size: 0.72rem; opacity: 0.85; }

.toc-item-title { flex: 1; min-width: 0; }
.toc-dots {
  flex: 1;
  border-bottom: 1px dotted var(--border);
  margin: 0 8px;
  position: relative;
  top: -3px;
  min-width: 12px;
}
.toc-pg {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  flex-shrink: 0;
  letter-spacing: 0.05em;
}
.toc-item.active .toc-pg { color: var(--accent); }

.toc-empty {
  padding: 40px 20px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  line-height: 2.2;
}

/* Backdrop for TOC */
#toc-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 699;
  backdrop-filter: blur(2px);
}
#toc-backdrop.open { display: block; }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 600;
}
#loading.active { display: flex; }
.loader-ring {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 22px; left: 50%;
  transform: translateX(-50%);
  background: var(--float-bg);
  border: 1px solid var(--border);
  border-bottom: 2px solid var(--accent);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  padding: 9px 20px;
  border-radius: 20px;
  z-index: 9999;
  backdrop-filter: blur(16px);
  letter-spacing: 0.06em;
  white-space: nowrap;
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  pointer-events: none;
}
.toast.err { border-bottom-color: var(--accent2); }
.toast.out { animation: toastOut 0.25s ease both; }
@keyframes toastIn  { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity:1; transform:translateX(-50%) translateY(0); } to { opacity:0; transform:translateX(-50%) translateY(8px); } }

/* Flip keyframes (used by JS-driven GSAP-style animation) */
@keyframes flipForward {
  0%   { transform: rotateY(0deg); }
  100% { transform: rotateY(-180deg); }
}
@keyframes flipBack {
  0%   { transform: rotateY(0deg); }
  100% { transform: rotateY(180deg); }
}

* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<!-- Stage -->
<div id="stage">

  <!-- Drop zone -->
  <div id="drop-zone"
    onclick="triggerUpload()"
    ondragover="onDragOver(event)"
    ondragleave="onDragLeave()"
    ondrop="onDrop(event)">
    <div class="dz-icon">📖</div>
    <div class="dz-title">FOLIO</div>
    <div class="dz-sub">Drop a PDF here or click to browse</div>
    <button class="dz-btn" onclick="event.stopPropagation();triggerUpload()">Open PDF File</button>
  </div>

  <!-- Book -->
  <div id="book-wrap">
    <div class="page-side" id="side-left">
      <canvas id="canvas-left" class="page-canvas"></canvas>
      <div class="pg-num" id="pgnum-left"></div>
    </div>
    <div id="spine"></div>
    <div class="page-side" id="side-right">
      <canvas id="canvas-right" class="page-canvas"></canvas>
      <div class="pg-num" id="pgnum-right"></div>
    </div>
  </div>
</div>

<!-- Flip ghost -->
<div id="flip-ghost">
  <div id="flip-page">
    <canvas id="canvas-ghost"></canvas>
  </div>
</div>

<!-- TOC backdrop -->
<div id="toc-backdrop" onclick="closeTOC()"></div>

<!-- TOC panel -->
<div id="toc-panel">
  <div id="toc-header">
    <div class="toc-title">Contents</div>
    <div class="toc-close" onclick="closeTOC()">✕</div>
  </div>
  <div id="toc-list"></div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loading-text">Loading…</div>
</div>

<!-- Floating nav — left -->
<div class="float-nav left-side" id="nav-left">
  <button class="fnav-btn" id="btn-first" title="First page" onclick="goFirst()">⟨⟨</button>
  <button class="fnav-btn" id="btn-prev"  title="Previous spread" onclick="goPrev()">◀</button>
</div>

<!-- Floating nav — right -->
<div class="float-nav right-side" id="nav-right">
  <button class="fnav-btn" id="btn-next" title="Next spread" onclick="goNext()">▶</button>
  <button class="fnav-btn" id="btn-last" title="Last page" onclick="goLast()">⟩⟩</button>
</div>

<!-- Page chip -->
<div id="page-chip" title="Click to jump to page">
  <span id="chip-label">Pg </span><input id="page-jump" type="number" min="1" onkeydown="if(event.key==='Enter')jumpToPage(this.value)"> / <span id="chip-total">0</span>
</div>

<!-- Progress bar -->
<div id="progress-bar-wrap" onclick="seekProgress(event)" title="Click to seek">
  <div id="progress-fill"></div>
</div>

<!-- Floating menu -->
<div id="menu-root">
  <div id="menu-trigger" onclick="toggleMenu()" title="Menu">
    <span class="burger-bar"></span>
    <span class="burger-bar"></span>
    <span class="burger-bar"></span>
  </div>
  <div id="menu-panel">

    <!-- Search -->
    <div class="menu-section">
      <button class="menu-item" onclick="toggleSearch()">
        <span class="menu-icon">⌕</span>
        <span class="menu-label">Search</span>
        <span class="menu-badge" id="search-badge"></span>
      </button>
      <div id="search-panel">
        <div class="search-row">
          <input id="search-input" type="text" placeholder="Search document…"
            oninput="onSearchInput()" onkeydown="onSearchKey(event)">
          <button class="search-go" onclick="doSearch()">Go</button>
        </div>
        <div id="search-results-menu"></div>
      </div>
    </div>

    <!-- TOC -->
    <div class="menu-section">
      <button class="menu-item" onclick="openTOC();closeMenu()">
        <span class="menu-icon">☰</span>
        <span class="menu-label">Table of Contents</span>
      </button>
    </div>

    <!-- View -->
    <div class="menu-section">
      <button class="menu-item" onclick="toggleTheme()">
        <span class="menu-icon">◐</span>
        <span class="menu-label">Dark / Light</span>
        <span class="menu-badge" id="theme-badge">Dark</span>
      </button>
      <button class="menu-item" onclick="toggleFullscreen()">
        <span class="menu-icon">⛶</span>
        <span class="menu-label">Fullscreen</span>
        <span class="menu-badge" id="fs-badge">Off</span>
      </button>
    </div>

    <!-- File -->
    <div class="menu-section">
      <button class="menu-item" onclick="triggerUpload();closeMenu()">
        <span class="menu-icon">⊕</span>
        <span class="menu-label">Open PDF</span>
      </button>
    </div>

  </div>
</div>

<input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none" onchange="onFileSelect(event)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let pdfDoc       = null;
let totalPages   = 0;
let currentSpread = 0;
let pageTexts    = {};
let searchResults = [];
let searchQuery  = '';
let isAnimating  = false;
let isDark       = true;
let tocOpen      = false;
let menuOpen     = false;
let searchPanelOpen = false;
let singlePage   = false; // narrow screens

// ── SPREAD HELPERS ──
function spreadPages(s) {
  if (singlePage) {
    return { left: null, right: s + 1 };
  }
  return { left: s * 2 + 1, right: s * 2 + 2 };
}
function totalSpreads() {
  if (singlePage) return totalPages;
  return Math.ceil(totalPages / 2);
}

// ── SIZING ──
function computeLayout() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  // single-page mode on narrow screens or portrait
  singlePage = W < 600;
  return { W, H };
}

async function sizeBook() {
  if (!pdfDoc) return;
  const { W, H } = computeLayout();
  const page = await pdfDoc.getPage(1);
  const vp   = page.getViewport({ scale: 1 });
  const ratio = vp.height / vp.width; // page aspect

  const bookWrap = document.getElementById('book-wrap');
  const sLeft    = document.getElementById('side-left');
  const sRight   = document.getElementById('side-right');
  const spine    = document.getElementById('spine');

  if (singlePage) {
    // Single page fills screen
    sLeft.style.display = 'none';
    spine.style.display = 'none';
    sRight.style.display = 'block';
    sRight.style.width = W + 'px';
    sRight.style.height = H + 'px';
    bookWrap.style.width  = W + 'px';
    bookWrap.style.height = H + 'px';
  } else {
    sLeft.style.display = 'block';
    spine.style.display = 'block';

    // Two pages side by side flush to screen
    // Determine scale: fit height first, then check if width fits
    const pageW_byH = H / ratio;
    const totalW_byH = pageW_byH * 2; // no padding

    let pageW, pageH;
    if (totalW_byH <= W) {
      // height-constrained
      pageH = H;
      pageW = pageW_byH;
    } else {
      // width-constrained
      pageW = W / 2;
      pageH = pageW * ratio;
    }

    [sLeft, sRight].forEach(el => {
      el.style.width  = pageW + 'px';
      el.style.height = pageH + 'px';
    });
    bookWrap.style.width  = (pageW * 2) + 'px';
    bookWrap.style.height = pageH + 'px';
    spine.style.width = '0px';
  }
}

// ── FILE ──
function triggerUpload() {
  document.getElementById('file-input').click();
}
function onFileSelect(e) {
  const f = e.target.files[0];
  if (f) loadPDF(f);
  e.target.value = '';
}
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}
function onDragLeave() {
  document.getElementById('drop-zone').classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadPDF(f);
  else showToast('Please drop a PDF file', true);
}

async function loadPDF(file) {
  showLoading('Loading PDF…');
  try {
    const buf = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
    totalPages = pdfDoc.numPages;
    currentSpread = 0;
    pageTexts = {};
    searchResults = [];
    searchQuery = '';

    document.getElementById('drop-zone').classList.add('hidden');
    document.getElementById('book-wrap').classList.add('active');
    ['nav-left','nav-right','page-chip','progress-bar-wrap'].forEach(id => {
      document.getElementById(id).classList.add('active');
    });
    document.getElementById('chip-total').textContent = totalPages;
    document.getElementById('page-jump').max = totalPages;

    await sizeBook();
    extractAllText();
    await extractTOC();
    hideLoading();
    await renderSpread(0, 'none');
    showToast(file.name.replace('.pdf', ''));
  } catch(err) {
    hideLoading();
    showToast('Failed to load PDF', true);
    console.error(err);
  }
}

// ── RENDER ──
async function renderSpread(s, dir) {
  const { left, right } = spreadPages(s);
  await Promise.all([
    left  ? renderPage(left,  'canvas-left',  'side-left')  : clearSide('canvas-left'),
    right ? renderPage(right, 'canvas-right', 'side-right') : clearSide('canvas-right'),
  ]);
  setLabel('pgnum-left',  left);
  setLabel('pgnum-right', right);
  updateProgress();
  updateNavBtns();
  updateChip();
  syncTOCActive();
  if (searchQuery) markSearchHits();
}

function setLabel(id, pageNum) {
  const el = document.getElementById(id);
  if (!pageNum) { el.textContent = ''; return; }
  el.textContent = pageNum;
  const hit = searchResults.some(r => r.page === pageNum);
  el.classList.toggle('hit', hit);
}

async function renderPage(pageNum, canvasId, sideId) {
  const side   = document.getElementById(sideId);
  const canvas = document.getElementById(canvasId);
  const W = side.clientWidth;
  const H = side.clientHeight;
  if (!W || !H) return;

  const page = await pdfDoc.getPage(pageNum);
  const vp   = page.getViewport({ scale: 1 });
  const scale = Math.min(W / vp.width, H / vp.height);
  const svp   = page.getViewport({ scale });

  canvas.width  = svp.width;
  canvas.height = svp.height;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  // Fill background (for light mode)
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = isDark ? '#1a1a1a' : '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  await page.render({ canvasContext: ctx, viewport: svp }).promise;
}

function clearSide(canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ── FLIP ANIMATION ──
async function animatedFlip(fromSpread, toSpread) {
  if (isAnimating) return;
  isAnimating = true;
  const dir = toSpread > fromSpread ? 'next' : 'prev';

  // Which side turns?
  const turningCanvas = dir === 'next'
    ? document.getElementById('canvas-right')
    : document.getElementById('canvas-left');
  const turningside   = dir === 'next'
    ? document.getElementById('side-right')
    : document.getElementById('side-left');

  const ghost     = document.getElementById('flip-ghost');
  const flipPage  = document.getElementById('flip-page');
  const gc        = document.getElementById('canvas-ghost');

  // Copy turning page into ghost canvas
  const rect = turningside.getBoundingClientRect();
  ghost.style.left    = rect.left + 'px';
  ghost.style.width   = rect.width + 'px';
  gc.width  = turningCanvas.width  || rect.width;
  gc.height = turningCanvas.height || rect.height;
  gc.style.width  = rect.width + 'px';
  gc.style.height = rect.height + 'px';
  gc.getContext('2d').drawImage(turningCanvas, 0, 0, gc.width, gc.height);

  // Set perspective origin
  flipPage.style.transformOrigin = dir === 'next' ? 'left center' : 'right center';
  flipPage.style.transition = 'none';
  flipPage.style.transform  = 'rotateY(0deg)';
  ghost.classList.add('active');

  // Add gradient shadow on ghost
  gc.getContext('2d');

  // Render new spread underneath (invisible during flip)
  currentSpread = toSpread;
  await renderSpread(toSpread, dir);

  // Animate the flip
  requestAnimationFrame(() => {
    flipPage.style.transition = 'transform 0.52s cubic-bezier(0.645,0.045,0.355,1.000)';
    flipPage.style.transform  = dir === 'next' ? 'rotateY(-180deg)' : 'rotateY(180deg)';
  });

  await sleep(540);
  ghost.classList.remove('active');
  flipPage.style.transition = 'none';
  isAnimating = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── NAVIGATION ──
async function goNext() {
  if (isAnimating || !pdfDoc || currentSpread >= totalSpreads() - 1) return;
  const prev = currentSpread;
  await animatedFlip(prev, currentSpread + 1);
}
async function goPrev() {
  if (isAnimating || !pdfDoc || currentSpread <= 0) return;
  const prev = currentSpread;
  await animatedFlip(prev, currentSpread - 1);
}
async function goFirst() {
  if (isAnimating || !pdfDoc || currentSpread === 0) return;
  currentSpread = 0;
  await renderSpread(0, 'none');
}
async function goLast() {
  if (isAnimating || !pdfDoc) return;
  const last = totalSpreads() - 1;
  if (currentSpread === last) return;
  currentSpread = last;
  await renderSpread(last, 'none');
}
async function goToPage(pageNum, animate) {
  if (!pdfDoc) return;
  const p = Math.max(1, Math.min(totalPages, pageNum));
  const spread = singlePage ? p - 1 : Math.floor((p - 1) / 2);
  if (spread === currentSpread) return;
  const diff = Math.abs(spread - currentSpread);
  if (animate && diff === 1) {
    await animatedFlip(currentSpread, spread);
  } else {
    currentSpread = spread;
    await renderSpread(spread, 'none');
  }
}
async function jumpToPage(val) {
  const n = parseInt(val);
  if (!isNaN(n)) await goToPage(n, true);
}

// ── PROGRESS ──
function updateProgress() {
  const pct = totalSpreads() <= 1 ? 100 : (currentSpread / (totalSpreads() - 1)) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}
function seekProgress(e) {
  if (!pdfDoc) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const s    = Math.round(pct * (totalSpreads() - 1));
  if (s !== currentSpread) { currentSpread = s; renderSpread(s, 'none'); }
}
function updateNavBtns() {
  document.getElementById('btn-first').disabled = currentSpread === 0;
  document.getElementById('btn-prev').disabled  = currentSpread === 0;
  document.getElementById('btn-next').disabled  = currentSpread >= totalSpreads() - 1;
  document.getElementById('btn-last').disabled  = currentSpread >= totalSpreads() - 1;
}
function updateChip() {
  const { left, right } = spreadPages(currentSpread);
  const pg = left || right || 1;
  document.getElementById('page-jump').value = pg;
}

// ── TOC ──
async function extractTOC() {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  try {
    const outline = await pdfDoc.getOutline();
    if (!outline || !outline.length) {
      list.innerHTML = '<div class="toc-empty">No table of contents<br>found in this PDF</div>';
      return;
    }
    await flattenOutline(outline, 1, list);
  } catch(_) {
    list.innerHTML = '<div class="toc-empty">Could not read<br>table of contents</div>';
  }
}

async function flattenOutline(items, level, container) {
  for (const item of items) {
    let pageNum = null;
    try {
      if (item.dest) {
        const dest = typeof item.dest === 'string'
          ? await pdfDoc.getDestination(item.dest)
          : item.dest;
        if (dest) pageNum = await pdfDoc.getPageIndex(dest[0]) + 1;
      }
    } catch(_) {}

    const div = document.createElement('div');
    div.className = 'toc-item';
    div.dataset.level = level;
    div.dataset.page  = pageNum || '';

    div.innerHTML = `
      <span class="toc-item-title">${escHtml(item.title || '—')}</span>
      <span class="toc-dots"></span>
      <span class="toc-pg">${pageNum || ''}</span>
    `;
    div.onclick = () => {
      if (pageNum) goToPage(pageNum, true);
      document.querySelectorAll('.toc-item').forEach(e => e.classList.remove('active'));
      div.classList.add('active');
      closeTOC();
    };
    container.appendChild(div);

    if (item.items && item.items.length && level < 3) {
      await flattenOutline(item.items, level + 1, container);
    }
  }
}

function syncTOCActive() {
  const { left, right } = spreadPages(currentSpread);
  const items = document.querySelectorAll('.toc-item[data-page]');
  let lastActive = null;
  items.forEach(el => {
    const pg = parseInt(el.dataset.page);
    if (pg && (pg === left || pg === right)) lastActive = el;
    else if (pg && pg <= (left || right || 1)) lastActive = el;
    el.classList.remove('active');
  });
  if (lastActive) lastActive.classList.add('active');
}

function openTOC() {
  document.getElementById('toc-panel').classList.add('open');
  document.getElementById('toc-backdrop').classList.add('open');
  tocOpen = true;
}
function closeTOC() {
  document.getElementById('toc-panel').classList.remove('open');
  document.getElementById('toc-backdrop').classList.remove('open');
  tocOpen = false;
}

// ── TEXT EXTRACTION ──
async function extractAllText() {
  for (let i = 1; i <= totalPages; i++) {
    try {
      const page    = await pdfDoc.getPage(i);
      const content = await page.getTextContent();
      pageTexts[i]  = content.items.map(it => it.str).join(' ');
    } catch(_) { pageTexts[i] = ''; }
  }
}

// ── SEARCH ──
let searchDebounce;
function onSearchInput() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(doSearch, 320);
}
function onSearchKey(e) {
  if (e.key === 'Escape') clearSearch();
  if (e.key === 'Enter')  doSearch();
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  searchQuery = q;
  if (!q || !pdfDoc) { clearSearch(); return; }

  searchResults = [];
  const lower = q.toLowerCase();
  for (let pg = 1; pg <= totalPages; pg++) {
    const text = pageTexts[pg] || '';
    const low  = text.toLowerCase();
    let idx = 0;
    while ((idx = low.indexOf(lower, idx)) !== -1) {
      const snippet = text.substring(Math.max(0, idx - 38), idx + q.length + 55);
      searchResults.push({ page: pg, snippet, q });
      idx += lower.length;
    }
  }

  renderSearchPanel();
  markSearchHits();

  const badge = document.getElementById('search-badge');
  badge.textContent = searchResults.length ? searchResults.length : '';
  badge.className   = 'menu-badge' + (searchResults.length ? ' on' : '');
}

function renderSearchPanel() {
  const panel = document.getElementById('search-results-menu');
  if (!searchResults.length) {
    panel.innerHTML = '<div class="sr-empty">No results</div>';
    return;
  }
  const shown = searchResults.slice(0, 50);
  panel.innerHTML = shown.map(r => {
    const hl = r.snippet.replace(new RegExp(escReg(r.q),'gi'), m => `<mark>${escHtml(m)}</mark>`);
    return `<div class="sr-item" onclick="goToPage(${r.page},true);closeMenu()">
      <div class="sr-page">Pg ${r.page}</div>
      <div class="sr-text">…${hl}…</div>
    </div>`;
  }).join('');
  if (searchResults.length > 50) {
    panel.innerHTML += `<div class="sr-empty">+${searchResults.length - 50} more</div>`;
  }
}

function markSearchHits() {
  const { left, right } = spreadPages(currentSpread);
  document.getElementById('pgnum-left').classList.toggle('hit', searchResults.some(r => r.page === left));
  document.getElementById('pgnum-right').classList.toggle('hit', searchResults.some(r => r.page === right));
}

function clearSearch() {
  searchResults = [];
  searchQuery   = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-results-menu').innerHTML = '';
  document.getElementById('search-badge').textContent = '';
  document.getElementById('search-badge').className = 'menu-badge';
  document.getElementById('pgnum-left').classList.remove('hit');
  document.getElementById('pgnum-right').classList.remove('hit');
}

function toggleSearch() {
  searchPanelOpen = !searchPanelOpen;
  document.getElementById('search-panel').classList.toggle('open', searchPanelOpen);
  if (searchPanelOpen) setTimeout(() => document.getElementById('search-input').focus(), 80);
}

// ── MENU ──
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('menu-trigger').classList.toggle('open', menuOpen);
  document.getElementById('menu-panel').classList.toggle('open', menuOpen);
}
function closeMenu() {
  menuOpen = false;
  document.getElementById('menu-trigger').classList.remove('open');
  document.getElementById('menu-panel').classList.remove('open');
}

// ── THEME ──
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-badge').textContent = isDark ? 'Dark' : 'Light';
  if (pdfDoc) renderSpread(currentSpread, 'none');
}

// ── FULLSCREEN ──
function toggleFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
  }
}
document.addEventListener('fullscreenchange', () => {
  const on = !!document.fullscreenElement;
  document.getElementById('fs-badge').textContent = on ? 'On' : 'Off';
  document.getElementById('fs-badge').className   = 'menu-badge' + (on ? ' on' : '');
  if (pdfDoc) { setTimeout(() => { sizeBook().then(() => renderSpread(currentSpread, 'none')); }, 100); }
});

// ── LOADING ──
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading').classList.add('active');
}
function hideLoading() { document.getElementById('loading').classList.remove('active'); }

// ── TOAST ──
let toastTimer;
function showToast(msg, err = false) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (err ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, 3000);
}

// ── ESCAPE HELPERS ──
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escReg(s)  { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'PageDown') goNext();
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   goPrev();
  if (e.key === 'Home') goFirst();
  if (e.key === 'End')  goLast();
  if (e.key === 'Escape') { closeMenu(); closeTOC(); clearSearch(); }
  if (e.key === 'f' && !e.ctrlKey && !e.metaKey) toggleFullscreen();
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); toggleMenu(); toggleSearch(); }
});

// ── TOUCH / SWIPE ──
let tx0 = 0;
document.getElementById('stage').addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive: true });
document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  if (Math.abs(dx) > 55) { dx < 0 ? goNext() : goPrev(); }
});

// Mouse drag
let mx0 = 0, dragging = false;
document.getElementById('stage').addEventListener('mousedown', e => { mx0 = e.clientX; dragging = true; });
document.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false;
  const dx = e.clientX - mx0;
  if (Math.abs(dx) > 70) { dx < 0 ? goNext() : goPrev(); }
});

// Click outside menu to close
document.addEventListener('click', e => {
  if (!e.target.closest('#menu-root')) closeMenu();
});

// ── RESIZE ──
let rTimer;
window.addEventListener('resize', () => {
  clearTimeout(rTimer);
  rTimer = setTimeout(async () => {
    if (!pdfDoc) return;
    await sizeBook();
    await renderSpread(currentSpread, 'none');
  }, 180);
});
</script>
</body>
</html>
